server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Behind Cloud Run, TLS terminates at the Google Front End and plain HTTP is
    # forwarded to this container on :8080. So nginx's own $scheme/$server_port are
    # http/8080 — if it builds an absolute redirect (e.g. the implicit trailing-slash
    # redirect from `try_files $uri/`), the Location leaks `http://host:8080/...`,
    # which Googlebot can't fetch (→ "Blocked: unauthorized request (401)"). Emit a
    # relative Location instead so the client keeps the original https host:port.
    absolute_redirect off;
    port_in_redirect off;

    # Canonical host: redirect www -> apex. Cloud Run's Google Front End terminates
    # TLS and forwards the original Host header, so $host is the real client host.
    # Requires www.bessavagner.com to be mapped to this Cloud Run service + DNS.
    if ($host = "www.bessavagner.com") {
        return 301 https://bessavagner.com$request_uri;
    }

    # gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long cache for fingerprinted assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|webp|svg|ico|pdf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS — clients reach the site over HTTPS via Google Front End. Add "; preload"
    # only if you intend to submit to hstspreload.org (hard to undo). includeSubDomains
    # assumes every bessavagner.com subdomain is HTTPS-only.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
