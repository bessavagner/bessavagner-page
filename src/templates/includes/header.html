    <div class="flex-1">

    </div>
    <div class="flex items-center gap-2">
        <label class="flex items-center gap-2 cursor-pointer">
            <span class="sr-only">Toggle dark mode</span>
            <input type="checkbox" class="toggle theme-controller"
                   aria-label="Toggle dark mode" title="Toggle dark mode" />
        </label>
        <div class="flex-none">
            <a href="#section-cards" class="btn btn-square btn-ghost" aria-label="Go to portfolio">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    class="inline-block h-5 w-5 stroke-current" aria-hidden="true" focusable="false">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z">

<script>
    (function () {
        const themeToggle = document.querySelector('.theme-controller');
        if (!themeToggle) return;
        // Initial theme is applied in base.html before paint; just sync the control.
        const isDark = document.documentElement.getAttribute('data-theme') === 'custom-dark';
        themeToggle.checked = isDark;

        themeToggle.addEventListener('change', function () {
            const theme = themeToggle.checked ? 'custom-dark' : 'custom';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });
    })();
</script>
