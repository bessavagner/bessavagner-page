name: Deploy web (Astro) to Cloud Run

# Builds the static Astro site in web/ into an nginx image and deploys it to the
# existing Cloud Run service `bessavagner-page` (us-central1).
#
# Required GitHub secrets (see docs/.ai/plans/003-cloud-run-deploy.md):
#   GCP_WIF_PROVIDER     - Workload Identity provider resource name
#   GCP_SERVICE_ACCOUNT  - deployer service account email
#   PUBLIC_WEB3FORMS_KEY - Web3Forms access key (baked into the static build)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-web-cloudrun.yml'
  workflow_dispatch: {}
  workflow_call:
    inputs:
      publish_at:
        description: 'ISO instant to pin as "now" for publication visibility (optional).'
        required: false
        type: string

env:
  PROJECT_ID: bessavagner-page
  REGION: us-central1
  SERVICE: bessavagner-page
  AR_REPO: web
  IMAGE: site
  # Privacy-friendly analytics (Umami). The website id is public (it ships in the
  # page source), so it lives here rather than in a secret.
  PUBLIC_ANALYTICS_WEBSITE_ID: d5bfb9cb-9af4-4245-9c52-abf95f0d82a1
  PUBLIC_ANALYTICS_SRC: https://cloud.umami.is/script.js
  PUBLIC_BUTTONDOWN_URL: https://buttondown.com/bessavagner
  # Google Analytics 4 Measurement ID. Public (it ships in the page source), so
  # it lives here rather than in a secret.
  PUBLIC_GA4_MEASUREMENT_ID: G-0X4F4KLDSB

jobs:
  clock:
    name: Pin the publish instant
    runs-on: ubuntu-latest
    outputs:
      publish_at: ${{ steps.resolve.outputs.publish_at }}
    steps:
      - name: Resolve publish_at
        id: resolve
        env:
          PUBLISH_AT_INPUT: ${{ inputs.publish_at }}
        run: |
          if [ -n "$PUBLISH_AT_INPUT" ]; then
            echo "publish_at=$PUBLISH_AT_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "publish_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Type check & build
    needs: clock
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      PUBLISH_AT: ${{ needs.clock.outputs.publish_at }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.15.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      # A post with no `status` key is silently a draft: content.config.ts defaults it
      # rather than failing the build, so one other post's typo can never take the whole
      # deploy down. That leniency only works if something else insists the key is there.
      # This is that something.
      - name: Every post declares a status
        run: pnpm post:lint

      # A post edited after `pnpm post:approve` has a stale reviewHash: the production
      # build silently filters it out and it 404s where it should be live (the whole
      # blog once did). `post status` only warns; here it is a hard failure, because
      # this is the deploy that would ship the breakage. Fix: pnpm post:approve <path>.
      - name: No approvals went stale
        run: pnpm post:gate

      - name: Build
        run: pnpm build

  deploy:
    needs: [clock, check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build & push image
        run: |
          IMG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE}:${GITHUB_SHA}"
          docker build \
            --build-arg PUBLIC_WEB3FORMS_KEY="${{ secrets.PUBLIC_WEB3FORMS_KEY }}" \
            --build-arg PUBLIC_ANALYTICS_WEBSITE_ID="${PUBLIC_ANALYTICS_WEBSITE_ID}" \
            --build-arg PUBLIC_ANALYTICS_SRC="${PUBLIC_ANALYTICS_SRC}" \
            --build-arg PUBLIC_BUTTONDOWN_URL="${PUBLIC_BUTTONDOWN_URL}" \
            --build-arg PUBLIC_GA4_MEASUREMENT_ID="${PUBLIC_GA4_MEASUREMENT_ID}" \
            --build-arg PUBLISH_AT="${{ needs.clock.outputs.publish_at }}" \
            -t "$IMG" \
            -t "${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE}:latest" \
            web
          docker push --all-tags "${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${IMAGE}"
          echo "IMG=$IMG" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMG" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" \
            --format='value(status.url)'

      # Ask Search Console to re-read the sitemap. Google re-downloads it on its own
      # cadence, which lagged 4 days / 12 URLs behind the live sitemap when this was
      # added — new posts sat undiscovered. Best-effort: a failed ping must NEVER fail
      # a deploy, so both steps are continue-on-error and every path exits 0.
      #
      # Needs its own auth step: the deploy credentials above carry only the
      # cloud-platform scope, which does NOT cover Search Console. It also requires
      # GCP_SERVICE_ACCOUNT to be an OWNER on the Search Console property — GCP IAM
      # grants no Search Console access on its own (they are separate systems).
      - name: Authenticate for Search Console
        id: gsc_auth
        continue-on-error: true
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/webmasters

      - name: Ping Search Console with the sitemap
        continue-on-error: true
        env:
          GSC_TOKEN: ${{ steps.gsc_auth.outputs.access_token }}
          SITE: sc-domain:bessavagner.com
          SITEMAP: https://bessavagner.com/sitemap-index.xml
        run: |
          if [ -z "${GSC_TOKEN}" ]; then
            echo "::warning::No Search Console token minted — skipping sitemap ping. Is the deploy service account an owner on the Search Console property?"
            exit 0
          fi
          enc() { jq -rn --arg v "$1" '$v|@uri'; }
          code=$(curl -sS -X PUT -o /tmp/gsc-ping.out -w '%{http_code}' \
            -H "Authorization: Bearer ${GSC_TOKEN}" \
            -H "Content-Length: 0" \
            "https://searchconsole.googleapis.com/webmasters/v3/sites/$(enc "${SITE}")/sitemaps/$(enc "${SITEMAP}")") || code="000"
          if [ "${code}" = "204" ] || [ "${code}" = "200" ]; then
            echo "Sitemap resubmitted to Search Console (HTTP ${code})."
          else
            echo "::warning::Sitemap ping failed (HTTP ${code}) — the deploy is unaffected."
            head -c 500 /tmp/gsc-ping.out 2>/dev/null || true
          fi
          exit 0
