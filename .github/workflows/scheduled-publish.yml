name: Scheduled publish (daily rebuild + digest)

# Surfaces scheduled blog AND buildlog posts without any manual step.
#
# How it works:
#   * Visibility is gated in code by `isPublic()` in web/src/lib/blog.ts: in a
#     production build a post shows only when `draft !== true` AND its `pubDate`
#     has arrived. So "publishing" a post = rebuilding the site on/after its date.
#   * This job therefore deploys EVERY day. A day with nothing due rebuilds the
#     same content, which is a harmless no-op — a build is cheap. There is
#     deliberately no release-date list here: the schedule lives in exactly one
#     place, each post's own `pubDate` frontmatter. A second copy of that data
#     would only drift, and silently skip the posts missing from it.
#   * The digest self-gates the same way. `digest.ts` sends only posts whose
#     pubDate falls on today's UTC date, prints "Nothing dated <date>" otherwise,
#     and is idempotent against its date-stamped subject, so a repeated run
#     cannot double-send.
#   * Timing: the cron fires at 12:05 UTC so it runs AFTER any morning-BRT
#     pubDate (e.g. 08:00 -03:00 = 11:00 UTC). A cron earlier than a post's
#     pubDate would rebuild before the post is due and silently hide it. The
#     mirror case: a pubDate whose instant falls LATER than 12:05 UTC in its
#     own UTC day is still emailed that day (the digest matches the exact UTC
#     calendar date) but isn't built until the next day's deploy (the build
#     gates on the instant), so the link it sends 404s for about a day.
#     web/scripts/check-publish.ts warns locally when a post is scheduled
#     that way.
#
# To change a release date: edit that post's `pubDate`. That is the whole ritual.
# To publish ad hoc: trigger this workflow manually (workflow_dispatch).
#
# What this job cannot see: a post that was never pushed. A GitHub Action runs
# against a fresh checkout of the remote, so an uncommitted file does not exist
# from here. That gap is covered locally by web/scripts/check-publish.ts, run
# each morning by the systemd timer in ops/systemd/.

on:
  schedule:
    - cron: '5 12 * * *' # 12:05 UTC daily, after morning-BRT pubDates
  workflow_dispatch: {}

permissions:
  actions: write # required to trigger deploy-web-cloudrun.yml via the API

jobs:
  publish:
    name: Rebuild the site and send any digest due today
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger the Cloud Run deploy workflow
        # --repo is required: this step runs before checkout, so gh has no local
        # git context to infer the repository from and would otherwise exit 1.
        run: gh workflow run deploy-web-cloudrun.yml --ref main --repo "$GITHUB_REPOSITORY"

      - name: Check out the repository (for the digest script)
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Send today's content digest
        env:
          BUTTONDOWN_KEY: ${{ secrets.BUTTONDOWN_KEY }}
        run: node --experimental-strip-types web/scripts/digest.ts
