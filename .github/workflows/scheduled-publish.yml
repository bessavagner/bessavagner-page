name: Scheduled publish (daily rebuild + digest)

# Surfaces scheduled blog AND buildlog posts without any manual step.
#
# How it works:
#   * Visibility is gated in code by `isPublic()` in web/src/lib/blog.ts: in a
#     production build a post shows only when `draft !== true` AND its `pubDate`
#     has arrived. So "publishing" a post = rebuilding the site on/after its date.
#   * This job therefore deploys EVERY day. A day with nothing due rebuilds the
#     same content, which is a harmless no-op — a build is cheap. There is
#     deliberately no release-date list here: the schedule lives in exactly one
#     place, each post's own `pubDate` frontmatter. A second copy of that data
#     would only drift, and silently skip the posts missing from it.
#   * The `digest` job runs the deploy job via `uses:` and only starts once it
#     succeeds (`needs: deploy`), so the digest never fires against a build that
#     is still in flight or that failed. `digest.ts` itself selects only
#     `published` posts, HEADs each URL before naming it, and dedupes against
#     what Buttondown has actually sent — see web/src/lib/digest-core.ts and
#     web/scripts/digest.ts for the guards.
#
# To change a release date: edit that post's `pubDate`. That is the whole ritual.
# To publish ad hoc: trigger this workflow manually (workflow_dispatch).
#
# What this job cannot see: a post that was never pushed. A GitHub Action runs
# against a fresh checkout of the remote, so an uncommitted file does not exist
# from here. That gap is covered locally by web/scripts/check-publish.ts, run
# each morning by the systemd timer in ops/systemd/.

on:
  schedule:
    - cron: '5 12 * * *' # 12:05 UTC daily, after morning-BRT pubDates
  workflow_dispatch: {}

# The reusable deploy below authenticates to Google Cloud via Workload Identity,
# which needs `id-token: write`. A called workflow can never hold more permission
# than its caller, and this repo's default workflow token is read-only — so
# without declaring the token here, every scheduled run failed at startup
# ("workflow file issue") before any job ran, and no timed post ever went live.
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-web-cloudrun.yml
    secrets: inherit

  digest:
    name: Send the digest for anything now provably live
    needs: deploy # only runs if the deploy succeeded
    runs-on: ubuntu-latest
    # The project lives in web/ — there is no lockfile or package.json at the
    # repo root, so pnpm install must run there, matching the deploy job.
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.15.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send the content digest
        env:
          BUTTONDOWN_KEY: ${{ secrets.BUTTONDOWN_KEY }}
        run: node --experimental-strip-types scripts/digest.ts
