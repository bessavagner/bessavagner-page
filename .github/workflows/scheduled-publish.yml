name: Scheduled publish (rebuild on release dates)

# Surfaces scheduled blog posts without any manual step.
#
# How it works:
#   * Visibility is gated in code by `isPublic()` in web/src/lib/blog.ts: in a
#     production build a post shows only when `draft !== true` AND its `pubDate`
#     has arrived. So "publishing" a post = rebuilding the site on/after its date.
#   * This job runs daily but only triggers the Cloud Run deploy on the dates
#     listed in RELEASE_DATES below. On every other day it exits early, so the
#     site is rebuilt (and a new post becomes visible) only every other day —
#     the actual cadence lives in each post's `pubDate`, mirrored here.
#
# To change the schedule: edit a post's `pubDate` and add/adjust the matching
# date in RELEASE_DATES. To publish ad hoc: trigger this workflow manually
# (workflow_dispatch) — the manual run skips the date check and always deploys.

on:
  schedule:
    - cron: '5 9 * * *' # 09:05 UTC daily; the date check below gates actual deploys
  workflow_dispatch: {}

permissions:
  actions: write # required to trigger deploy-web-cloudrun.yml via the API

jobs:
  publish:
    name: Deploy if a post is due today
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Release calendar (every other day). Each date must match a post's
      # pubDate in web/src/content/blog/*.mdx; isPublic() in src/lib/blog.ts
      # surfaces a post once its pubDate has arrived and this job rebuilds.
      RELEASE_DATES: >-
        2026-06-25 2026-06-27 2026-06-29 2026-07-01 2026-07-03 2026-07-05
        2026-07-07 2026-07-09 2026-07-11 2026-07-13 2026-07-15
        2026-07-17 2026-07-19 2026-07-21 2026-07-23 2026-07-25
    steps:
      - name: Decide whether today is a release day
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — deploying regardless of date."
            echo "due=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today="$(date -u +%F)"
          if echo "$RELEASE_DATES" | grep -qw "$today"; then
            echo "Today ($today) is a release day — will deploy."
            echo "due=true" >> "$GITHUB_OUTPUT"
          else
            echo "Today ($today) has nothing scheduled — skipping deploy."
            echo "due=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger the Cloud Run deploy workflow
        if: steps.gate.outputs.due == 'true'
        # --repo is required: this step runs before checkout, so gh has no local
        # git context to infer the repository from and would otherwise exit 1.
        run: gh workflow run deploy-web-cloudrun.yml --ref main --repo "$GITHUB_REPOSITORY"

      - name: Check out the repository (for the digest script)
        if: steps.gate.outputs.due == 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.gate.outputs.due == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Send today's content digest
        if: steps.gate.outputs.due == 'true'
        env:
          BUTTONDOWN_KEY: ${{ secrets.BUTTONDOWN_KEY }}
        run: node --experimental-strip-types web/scripts/digest.ts
