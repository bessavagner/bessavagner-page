name: Docker Build and Push

on:
  push:
    branches:
      - stable
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME || 'bessavagner-page' }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGENAME || 'bessavagner-page' }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# NOTE: deployment to Cloud Run (project id: bessavagner-page) is currently manual.
# See docs/.ai/plans/002-modernization-roadmap.md (T0.5 / T2.5) for adding an
# automated deploy step once Workload Identity / a service account is configured.
